<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block metadescription %}Modern Hanime browser and player experience.{% endblock %}" />
  <title>{% block title %}Hanime Homies{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/home"><i class="fa-solid fa-play-circle"></i> Hanime Homies</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/trending/recent/0">Trending</a></li>
          <li class="nav-item"><a class="nav-link" href="/browse">Browse</a></li>
          <li class="nav-item"><a class="nav-link" href="/search">Search</a></li>
        </ul>
        <form class="d-flex" method="get" action="/search">
          <input class="form-control form-control-sm me-2" name="query" placeholder="Search titles..." />
          <button class="btn btn-primary btn-sm" type="submit">Go</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container py-4 py-md-5">
    {% block content %}{% endblock %}
  </main>

  <footer class="container text-center small text-secondary py-4">
    <p class="mb-1">Built with Flask • API powered by hanime-python-api.</p>
    <p class="mb-0"><a href="/privacy">Privacy</a> · <a href="/terms">Terms</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
